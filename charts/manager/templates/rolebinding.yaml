apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kumquat:manager:leader-election
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kumquat:manager:leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "manager.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}