kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kumquat-hub
networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # Disable default CNI, we will install Flannel manually
  disableDefaultCNI: false
nodes:
  - role: control-plane
    image: kindest/node:v1.29.2
    extraPortMappings:
      # Tunnel Server NodePort
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP
      # Portal API
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      # VictoriaMetrics
      - containerPort: 30842
        hostPort: 30842
        protocol: TCP
