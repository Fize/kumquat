# Demo Application: Nginx deployed to 2 Sub clusters
# 6 replicas, automatically distributed by Scheduler across Sub clusters
apiVersion: apps.kumquat.io/v1alpha1
kind: Application
metadata:
  name: nginx-demo
  namespace: default
spec:
  workload:
    apiVersion: apps/v1
    kind: Deployment
  template:
    metadata:
      name: nginx-demo
      labels:
        app: nginx-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  replicas: 6
