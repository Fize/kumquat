# Blue-Green Rollout Demo
# Nginx blue-green deployment with automatic traffic switching
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-demo-active
  namespace: default
spec:
  selector:
    app: bluegreen-demo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-demo-preview
  namespace: default
spec:
  selector:
    app: bluegreen-demo
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps.kumquat.io/v1alpha1
kind: Application
metadata:
  name: bluegreen-demo
  namespace: default
spec:
  workload:
    apiVersion: apps/v1
    kind: Deployment
  template:
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bluegreen-demo
      labels:
        app: bluegreen-demo
    spec:
      selector:
        matchLabels:
          app: bluegreen-demo
      template:
        metadata:
          labels:
            app: bluegreen-demo
        spec:
          containers:
            - name: nginx
              image: nginx:1.25
              ports:
                - containerPort: 80
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
  replicas: 6
  placement:
    clusterSelector:
      matchLabels:
        connectionMode: Edge
  rolloutStrategy:
    type: BlueGreen
    blueGreen:
      activeService: bluegreen-demo-active
      previewService: bluegreen-demo-preview
      autoPromotionEnabled: true
      scaleDownDelaySeconds: 60
