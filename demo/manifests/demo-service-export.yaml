# Cross-Cluster Service Export - Demo mcs-lighthouse cross-cluster service discovery
# After exporting the service on Sub-1, it can be accessed from Sub-2 via clusterset.local DNS
---
# Deploy Nginx with Service on Sub-1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-cluster-nginx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cross-cluster-nginx
  template:
    metadata:
      labels:
        app: cross-cluster-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cross-cluster-nginx
  namespace: default
spec:
  selector:
    app: cross-cluster-nginx
  ports:
    - port: 80
      targetPort: 80
---
# Export the service (requires mcs-lighthouse addon to be enabled)
# Note: ServiceExport CRD is installed by submariner-operator
# If the CRD is not ready yet, this resource may fail to create;
# wait for the addon installation to complete
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: cross-cluster-nginx
  namespace: default
