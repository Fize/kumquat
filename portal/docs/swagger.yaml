        "401":
          description: '{\"code\":401,\"message\":\"未授权\"}'
          schema:
            additionalProperties: true
            type: object
        "403":
          description: '{\"code\":403,\"message\":\"无权限\"}'
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 获取用户列表（分页）
      tags:
      - users
    post:
      consumes:
      - application/json
      description: 创建新用户账号，仅 admin 角色可操作
      parameters:
      - description: 创建用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":0,\"data\":{user}}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: '{\"code\":400,\"message\":\"请求参数错误\"}'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: '{\"code\":401,\"message\":\"未授权\"}'
          schema:
            additionalProperties: true
            type: object
        "403":
          description: '{\"code\":403,\"message\":\"无权限\"}'
          schema:
            additionalProperties: true
            type: object
        "409":
          description: '{\"code\":409,\"message\":\"用户名或邮箱已存在\"}'
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 创建新用户
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定用户，仅 admin 角色可操作。不能删除最后一个 admin 用户。
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":0,\"message\":\"deleted\"}'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: '{\"code\":401,\"message\":\"未授权\"}'
          schema:
            additionalProperties: true
            type: object
        "403":
          description: '{\"code\":403,\"message\":\"不能删除最后一个 admin 用户\"}'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: '{\"code\":404,\"message\":\"用户不存在\"}'
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 删除用户
      tags:
      - users
    get:
      consumes:
      - application/json
      description: 获取指定 ID 的用户详情
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":0,\"data\":{user}}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: '{\"code\":400,\"message\":\"无效的用户ID\"}'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: '{\"code\":401,\"message\":\"未授权\"}'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: '{\"code\":404,\"message\":\"用户不存在\"}'
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 根据 ID 获取用户信息
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 更新指定用户的信息，仅 admin 角色可操作
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新用户请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":0,\"data\":{user}}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: '{\"code\":400,\"message\":\"请求参数错误\"}'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: '{\"code\":401,\"message\":\"未授权\"}'
          schema:
            additionalProperties: true
            type: object
        "403":
          description: '{\"code\":403,\"message\":\"无权限\"}'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: '{\"code\":404,\"message\":\"用户不存在\"}'
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 更新用户信息
      tags:
      - users
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
