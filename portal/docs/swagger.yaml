      tags:
      - roles
  /users:
    get:
      consumes:
      - application/json
      description: 获取所有用户的分页列表，需要 admin 角色或 user:read 权限
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{\"code\":0,\"data\":{users},\"pagination\":{...}}'
